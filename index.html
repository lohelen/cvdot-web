      // 處理圖示名稱對應
      let iconName = name;
      if (name === 'check-circle-2') iconName = 'check-circle';
      if (name === 'trash-2') iconName = 'trash-2';
      
      const icon = window.lucide.icons[iconName];
      if (!icon) return null;
      
      const svgString = icon.toSvg({ 
        width: size, 
        height: size, 
        class: className, 
        'stroke-width': strokeWidth,
        fill: fill
      });
      return <span className="inline-flex items-center justify-center" dangerouslySetInnerHTML={{ __html: svgString }} />;

                                <h2 className="text-2xl font-bold text-slate-900">{t.mockup.coverLetter.title}</h2>

                        <button className="w-full py-3 rounded-xl font-bold text-white bg-blue-500 hover:bg-blue-600 shadow-lg shadow-blue-500/30 transition-colors mt-auto">

                        <div className="mb-6">

                        </div>
                        <ul className="space-y-4 mb-8 flex-grow">
                          {t.pricing.bullets.premium.map((bullet, idx) => (
                            <li key={idx} className="flex items-start gap-3">
                              <span className="text-purple-500 mt-1 shrink-0"><Icon name="check" size={18} /></span>
                              <span className="text-slate-600 text-sm leading-relaxed">
                                <b className={`font-semibold ${bullet.highlight ? 'bg-yellow-300 px-1.5 py-0.5 rounded text-slate-900' : ''}`}>{bullet.bold}</b>{bullet.text}
                              </span>

                        <button className="w-full py-3 rounded-xl font-bold text-purple-600 bg-purple-50 hover:bg-purple-100 transition-colors mt-auto">

            <div className="flex justify-center items-center gap-2 mb-8">
              <SmartLogo className="w-8 h-8 rounded-lg" textClass="text-base" />
              <span className="font-bold text-xl text-white tracking-tight">CV.dot</span>
            </div>
            
            <div className="flex flex-wrap justify-center gap-6 sm:gap-10 mb-8 text-sm font-medium text-slate-400">
              <a href="#privacy" onClick={() => setCurrentHash('#privacy')} className="hover:text-white transition-colors">{t.footer.privacy}</a>
              <a href="#terms" onClick={() => setCurrentHash('#terms')} className="hover:text-white transition-colors">{t.footer.terms}</a>
              <a href="#refund" onClick={() => setCurrentHash('#refund')} className="hover:text-white transition-colors">{t.footer.refund}</a>
              <a href="mailto:support@cv-dot.om" className="hover:text-white transition-colors">{t.footer.contact}</a>
            </div>

            <p className="text-slate-500 text-sm mb-4">{t.footer.tagline}</p>
            <p className="text-slate-600 text-xs">© {new Date().getFullYear()} {t.footer.rights}</p>

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

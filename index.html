      // 處理圖示名稱對應
      let iconName = name;
      if (name === 'check-circle-2') iconName = 'check-circle';
      if (name === 'trash-2') iconName = 'trash-2';
      
      const icon = window.lucide.icons[iconName];
      if (!icon) return null;
      
      const svgString = icon.toSvg({ 
        width: size, 
        height: size, 
        class: className, 
        'stroke-width': strokeWidth,
        fill: fill
      });
      return <span className="inline-flex items-center justify-center" dangerouslySetInnerHTML={{ __html: svgString }} />;
